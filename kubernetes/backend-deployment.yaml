apiVersion: apps/v1
kind: Deployment
metadata:
  name: elearning-backend
  namespace: production
  labels:
    app: elearning-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: elearning-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: elearning-backend
    spec:
      containers:
      - name: backend
        image: youracr.azurecr.io/elearning-backend:latest
        ports:
        - containerPort: 8000
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
